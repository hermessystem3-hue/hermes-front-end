name: Deploy Development to Firebase

on:
  push:
    branches:
      - develop

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      NG_APP_FIREBASE_API_KEY: ${{ secrets.DEV_FIREBASE_API_KEY }}
      NG_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.DEV_FIREBASE_AUTH_DOMAIN }}
      NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.DEV_FIREBASE_PROJECT_ID }}
      NG_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.DEV_FIREBASE_STORAGE_BUCKET }}
      NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.DEV_FIREBASE_MESSAGING_SENDER_ID }}
      NG_APP_FIREBASE_APP_ID: ${{ secrets.DEV_FIREBASE_APP_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx ng build --configuration production

      - run: npm install -g firebase-tools

      - run: firebase deploy --only hosting --project dev --token ${{ secrets.FIREBASE_TOKEN }}
